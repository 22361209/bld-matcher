name: quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install uv==0.11.15
      - run: uv sync --frozen
      - if: github.event_name == 'pull_request'
        run: uv run python scripts/verify.py --base-ref origin/${{ github.base_ref }}
      - if: github.event_name == 'push'
        run: uv run python scripts/verify.py --base-ref ${{ github.event.before }}
