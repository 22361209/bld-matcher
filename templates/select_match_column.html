<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>选择匹配列</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="shell wide">
      {% set active_page = "match" %}
      {% include "_nav.html" %}

      <header class="page-header">
        <div class="page-title">
          <h1>选择匹配列</h1>
          <p>没有识别到 OE 或物料名称表头，请选择客户号码所在的列。</p>
        </div>
        <div class="primary-actions">
          <a class="button ghost-link" href="{{ url_for('index') }}">返回首页</a>
        </div>
      </header>

      <section class="toolbar-panel">
        <form action="{{ url_for('match_inquiry_with_column') }}" method="post" class="form">
          <input type="hidden" name="upload_path" value="{{ upload_path }}">
          <input type="hidden" name="original_filename" value="{{ original_filename }}">
          <input type="hidden" name="output_name" value="{{ output_name }}">
          <label>
            匹配列
            <select name="match_column">
              {% for column in preview.columns %}
                <option value="{{ column.index }}" {% if column.index == 0 %}selected{% endif %}>
                  {{ column.label }} 列
                </option>
              {% endfor %}
            </select>
          </label>
          <button type="submit">确认并生成结果</button>
        </form>
      </section>

      <section class="panel table-panel">
        <h2>文件预览：{{ preview.sheet }}</h2>
        <table>
          <thead>
            <tr>
              {% for column in preview.columns %}
                <th>{{ column.label }} 列</th>
              {% endfor %}
            </tr>
          </thead>
          <tbody>
            {% for row in preview.rows %}
              <tr>
                {% for value in row %}
                  <td>{{ value }}</td>
                {% endfor %}
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
