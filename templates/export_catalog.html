<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>导出产品目录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="shell">
      {% set active_page = "products" %}
      {% include "_nav.html" %}

      <header class="page-header">
        <div class="page-title">
          <h1>导出产品目录</h1>
          <p>选择导出的排序和表格格式。</p>
        </div>
        <div class="primary-actions">
          <a class="button ghost-link" href="{{ url_for('products') }}">返回产品目录</a>
        </div>
      </header>

      <section class="panel">
        <form action="{{ url_for('export_products') }}" method="post" class="form vertical">
          <input type="hidden" name="status" value="{{ status }}">
          <label>
            导出格式
            <select name="export_format">
              <option value="bld">按 BLD 号升序格式</option>
              <option value="brand">按汽车品牌格式</option>
            </select>
          </label>
          <p class="note">按汽车品牌格式会使用类似原始目录的列：NO.、SERIES、BLD NO.、ITEM、OE NO.、品牌号码、Models。</p>
          <button type="submit">导出 Excel</button>
        </form>
      </section>
    </main>
  </body>
</html>
